<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Welcome to FMS Collection</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        .wrapper {
            width: 100%;
            padding: 20px 0;
        }

        .container {
            width: 600px;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .header {
            background-color: #2563eb;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

            .header h1 {
                margin: 0;
                font-size: 22px;
            }

        .content {
            padding: 30px;
            color: #333333;
            font-size: 14px;
            line-height: 1.6;
        }

        .password-box {
            background-color: #f1f3f5;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin: 16px 0 24px 0;
        }

        .cta {
            text-align: center;
            margin: 30px 0;
        }

            .cta a {
                background-color: #2563eb;
                color: #ffffff;
                padding: 14px 28px;
                text-decoration: none;
                border-radius: 6px;
                font-size: 14px;
                display: inline-block;
            }

        .footer {
            background-color: #f4f6f8;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #888888;
        }

        .signature {
            margin-top: 24px;
        }
    </style>
</head>

<body>
    <table class="wrapper" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <table class="container" cellpadding="0" cellspacing="0">

                    <tr>
                        <td class="header">
                            <h1>Welcome to FMS Collection</h1>
                        </td>
                    </tr>

                    <tr>
                        <td class="content">
                            <p>Hello <strong>{{FirstName}}</strong>,</p>

                            <p>We’re excited to have you onboard! 🎉</p>

                            <p>Use <strong>{{EmailAddress}}</strong> as your username.</p>

                            <p><strong>Your temporary password:</strong></p>

                            <div class="password-box">
                                {{Password}}
                            </div>

                            <div class="cta">
                                <a href="{{LoginUrl}}">
                                    Login to FMS Collection
                                </a>
                            </div>

                            <div class="signature">
                                Regards,<br />
                                <strong>FMS Collection Team</strong><br />
                                <strong>Contact: 7387302730</strong>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td class="footer">
                            © {{Year}} FMS Collection
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
